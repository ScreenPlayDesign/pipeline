name: Deploy → Production

# Canonical production deploy for every SPD project. Hosted here — see
# ci.yml's header comment for why. workflow_call-only; the calling repo's
# own run-deploy-prod.yml (or deploy-prod.yml, for leaf-consumer repos)
# declares the actual `push: branches: [prod]` + `workflow_dispatch`
# triggers.
#
# TWO human gates between staging and prod, deliberately both kept:
#   1. Reviewing and approving the staging → prod PR itself (this repo's
#      webhook handler opens/refreshes it, never auto-merges it).
#   2. This workflow's own `environment: production` gate below — a
#      second, separate checkpoint, redundant with #1 on purpose. Resolves
#      against the CALLING repo's own "production" environment + its own
#      required reviewers — a downstream project still needs to configure
#      that itself, this file doesn't supply one for it.
#
# Version scheme: date-based tags, vYYYY.MM.DD.N, computed at deploy time.
# After a successful deploy this also writes a CHANGELOG.md entry and bumps
# package.json's version, then pushes that documentation commit directly to
# prod. That push needs a bypass-actor on prod's branch protection — see
# the PR_BOT_TOKEN note below. If PR_BOT_TOKEN isn't set (falls back to
# GITHUB_TOKEN), this step fails loudly but does NOT fail the deploy that
# already happened above it.
#
# Rollback: history only ever moves FORWARD here — this workflow never
# force-pushes or resets prod backward. A rollback is instead a normal new
# deploy whose tree happens to match an old tag: pass rollback-to-tag, and
# a "Restore rollback tree" step below overlays that old tag's files onto
# the current prod tip as one new commit, before the usual tag/build steps
# run on top of it as if it were any other push. "What's live" is always
# just whatever the newest tag says, even when that tag's content is old —
# see the "Restore rollback tree" step for the exact mechanics, and
# github-app's back-merge legs (prod→staging→dev) for how this then flows
# back down so staging/dev don't drift from whatever prod ends up at.
#
# ⚠️ Despite the filename, this workflow no longer touches Cloudflare — it
# builds, tags, and uploads dist/ as an artifact; the actual Cloudflare
# Pages deploy is triggered by ScreenPlayDesign/github-app's own Worker via
# workflow_dispatch on that repo's own relay.yml, once it observes this run
# succeed (see deploy-dev.yml's header comment for the full rationale). The
# CHANGELOG/version-bump commit below still happens here, unchanged — it's
# a client-repo git operation (needs PR_BOT_TOKEN, which is a client-repo
# secret), not a Cloudflare one, and per its own existing comment it was
# already designed to not gate on the deploy succeeding — now it just
# follows the artifact upload instead of a real deploy step, same spirit.

on:
  workflow_call:
    inputs:
      sync-shared-contracts:
        description: 'Copy supabase/functions/_shared/contracts.ts to src/types/shared-contracts.ts before building'
        type: boolean
        default: false
      rollback-to-tag:
        description: 'Old release tag to redeploy (e.g. v2026.07.01.1). Empty = normal deploy of the current prod tip.'
        type: string
        default: ''

permissions:
  contents: write   # for pushing the git tag

jobs:
  deploy:
    name: Deploy to Cloudflare Pages (prod)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Job-level, not workflow-level: a top-level `concurrency:` on a
    # workflow_call-only file makes GitHub try to serialize this reusable
    # workflow's own run against this single job's identical group, which it
    # reads as a self-deadlock — "Canceling since a deadlock was detected for
    # concurrency group: 'deploy-prod' between a top level workflow and
    # 'deploy'". Every run was hitting this, going all the way back — the
    # caller (web-dashboard's deploy-prod.yml) deliberately has no
    # concurrency block of its own, but that alone doesn't avoid the
    # deadlock; it's this file's top-level declaration that caused it.
    # Scoping the group to the job instead removes the ambiguity GitHub was
    # tripping over.
    concurrency:
      group: deploy-prod
      cancel-in-progress: false   # never cancel a prod deploy mid-flight

    # Producer's one-click gate. Configure at:
    # GitHub → Settings → Environments → production → Required reviewers
    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so git tag push + changelog diff work
          # PR_BOT_TOKEN, not the default token — github-actions[bot] isn't
          # a selectable bypass-actor on most repos' branch protection, only
          # installed Apps and real accounts are. Falling back to
          # GITHUB_TOKEN keeps the job running even if the secret isn't set
          # yet; it just means the pushes below fail against a protected
          # prod branch until PR_BOT_TOKEN exists.
          token: ${{ secrets.PR_BOT_TOKEN || secrets.GITHUB_TOKEN }}

      # Rollback only: overlay the OLD tag's file tree onto the CURRENT prod
      # tip as one new commit. Deliberately not `git reset`/`git checkout
      # <tag>` as the job's ref — that would detach from prod's real tip and
      # make the later `git push origin prod` a non-fast-forward (rejected)
      # or require force-pushing (rewrites shared history, exactly what
      # we're avoiding). This way prod's commit graph only ever grows
      # forward — this commit's parent is genuinely prod's current tip, it
      # just happens to restore old content — and the tag/build/deploy/
      # changelog steps below run completely unmodified on top of it, same
      # as any other push.
      - name: Restore rollback tree (rollback-to-tag only)
        if: inputs.rollback-to-tag != ''
        run: |
          git fetch --tags --quiet
          git checkout "${{ inputs.rollback-to-tag }}" -- .
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "revert: roll back prod tree to ${{ inputs.rollback-to-tag }}" --allow-empty
          git push origin HEAD:prod
          echo "✓ prod tree restored to ${{ inputs.rollback-to-tag }} as a new forward commit"

      - name: Create and push git tag
        id: stamp
        run: |
          DATE="$(date -u +%Y.%m.%d)"
          git fetch --tags --quiet
          N=$(( $(git tag -l "v${DATE}.*" | wc -l | tr -d ' ') + 1 ))
          TAG="v${DATE}.${N}"
          SHA="${GITHUB_SHA::7}"
          ISO=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG" -m "Deploy ${TAG} · ${SHA} · ${ISO}"
          git push origin "$TAG"
          echo "tag=${TAG}"  >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}"  >> "$GITHUB_OUTPUT"
          echo "iso=${ISO}"  >> "$GITHUB_OUTPUT"
          echo "✓ Tagged ${TAG}"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Sync shared-contracts.ts
        if: inputs.sync-shared-contracts
        run: cp supabase/functions/_shared/contracts.ts src/types/shared-contracts.ts || true

      - name: TypeScript check
        run: bun run typecheck

      - name: Build
        run: bun run build
        env:
          VITE_SUPABASE_URL:      ${{ vars.PROD_SUPABASE_URL      || secrets.PROD_SUPABASE_URL      || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.PROD_SUPABASE_ANON_KEY || secrets.PROD_SUPABASE_ANON_KEY || 'placeholder_anon_key' }}
          VITE_BUILD_TAG:         ${{ steps.stamp.outputs.tag }}
          VITE_BUILD_SHA:         ${{ steps.stamp.outputs.sha }}
          VITE_BUILD_TIME:        ${{ steps.stamp.outputs.iso }}
          VITE_BUILD_BRANCH:      ${{ github.ref_name }}

      # Static, unauthenticated stamp of exactly what's running at this URL —
      # readable from any origin (see public/_headers for the CORS grant).
      # This is what the super-admin "Deploys" panel fetches per-environment;
      # the nav-dropdown display only ever shows *your own current* session's
      # build, and only if you happen to be logged in on that exact origin.
      - name: Write build-info.json
        run: |
          cat > dist/build-info.json <<EOF
          {
            "environment": "prod",
            "branch": "${{ github.ref_name }}",
            "tag": "${{ steps.stamp.outputs.tag }}",
            "sha": "${{ steps.stamp.outputs.sha }}",
            "buildTime": "${{ steps.stamp.outputs.iso }}"
          }
          EOF

      # Consumed by deploy-relay's workflow_dispatch (see this file's header
      # comment) — github-app passes this exact name through as the
      # artifact_name input once it sees this run succeed.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-prod
          path: dist
          retention-days: 1

      - name: Update CHANGELOG.md + package.json version
        # Originally gated on a real deploy succeeding above it; now follows
        # the artifact upload instead. Same spirit as before — this is
        # documentation, not a gate, and was never meant to block on the
        # actual Cloudflare deploy landing (that now happens asynchronously,
        # in deploy-relay, after this workflow finishes entirely). Don't
        # fail the workflow over a doc-commit push that needs a one-time
        # bypass-actor setting; fail loudly in the log instead.
        run: |
          node <<'NODESCRIPT'
          const fs = require('fs')
          const { execSync } = require('child_process')

          const tag     = process.env.TAG
          const version = tag.replace(/^v/, '')
          const when    = new Date().toISOString().replace('T', ' ').slice(0, 16) + ' UTC'

          let prevTag = ''
          try {
            prevTag = execSync('git describe --tags --abbrev=0 HEAD^', { encoding: 'utf8' }).trim()
          } catch { /* first-ever tag — no previous one to diff against */ }

          const logCmd = prevTag
            ? `git log ${prevTag}..HEAD --pretty=format:"- %s (%h)" --no-merges`
            : `git log --pretty=format:"- %s (%h)" --no-merges -20`
          const commits = execSync(logCmd, { encoding: 'utf8' }).trim() || '- (no commits found)'

          const entry  = `## ${tag} — ${when}\n\n${commits}\n`
          const marker = '<!-- New entries are inserted directly below this line by deploy-prod.yml -->'
          const changelog = fs.readFileSync('CHANGELOG.md', 'utf8')
          if (!changelog.includes(marker)) throw new Error('CHANGELOG.md marker comment not found — check it wasn\'t edited away')
          fs.writeFileSync('CHANGELOG.md', changelog.replace(marker, `${marker}\n\n${entry}`))

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'))
          pkg.version = version
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n')

          console.log(`✓ CHANGELOG.md + package.json updated for ${tag}`)
          NODESCRIPT

          git add CHANGELOG.md package.json
          git commit -m "docs: release ${TAG} [skip ci]"

          if git push origin prod; then
            echo "✓ Release documentation committed to prod"
          else
            echo "⚠  Could not push the CHANGELOG/version commit to prod."
            echo "   1. Repo secret PR_BOT_TOKEN must be a fine-grained PAT"
            echo "      (Contents: Read and write, scoped to this repo)."
            echo "   2. That PAT's owning account must be on prod's bypass list:"
            echo "      Settings → Branches → prod → Allow specified actors to"
            echo "      bypass required pull requests → add your account."
            echo "   The deploy above already succeeded — only this doc commit is stuck."
          fi
        env:
          TAG: ${{ steps.stamp.outputs.tag }}
