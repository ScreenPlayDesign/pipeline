name: Deploy → Staging

# Canonical staging BUILD for every SPD project. Hosted here — see ci.yml's
# header comment for why. workflow_call-only; the calling repo's own
# deploy-staging.yml declares the actual `push: branches: [staging]` trigger.
#
# ⚠️ Despite the filename, this workflow no longer touches Cloudflare, and
# no longer runs the smoke gate either — both moved to ScreenPlayDesign/
# github-app's own relay.yml workflow, triggered by that repo's Worker once
# it observes this run succeed (see deploy-dev.yml's header comment for the
# full rationale — same one applies here). This job now does
# exactly two things: build dist/, and upload two artifacts for the relay to
# pick up:
#   dist-staging     — the built app, deployed to Cloudflare Pages by the relay
#   source-staging    — the full repo checkout (minus dist/node_modules),
#                        so the relay can `bun install` fresh and run the
#                        @smoke Playwright suite against the now-actually-
#                        live URL, exactly like the old in-repo smoke job did.
#                        Deploy and smoke can no longer run back-to-back in
#                        THIS job, since the real deploy no longer happens
#                        here at all.

on:
  workflow_call:
    inputs:
      sync-shared-contracts:
        description: 'Copy supabase/functions/_shared/contracts.ts to src/types/shared-contracts.ts before building'
        type: boolean
        default: false
      staging-url:
        description: 'Live staging URL the relay should smoke-test against'
        type: string
        required: true

concurrency:
  group: deploy-staging
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build (staging)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: staging   # tracking only — no required reviewers, unlike production

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Sync shared-contracts.ts
        if: inputs.sync-shared-contracts
        run: cp supabase/functions/_shared/contracts.ts src/types/shared-contracts.ts || true

      - name: TypeScript check
        run: bun run typecheck

      # No git tag for staging — only deploy-prod.yml cuts a real tag. Still
      # stamps sha/time/branch — see deploy-dev.yml's identical step for why.
      - name: Compute build stamp
        id: stamp
        run: |
          SHA="${GITHUB_SHA::7}"
          ISO=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "iso=${ISO}" >> "$GITHUB_OUTPUT"

      # Packaged BEFORE bun run build below installs dist/ and BEFORE
      # anything writes into node_modules further — keeps this artifact to
      # just what the relay needs to reinstall cleanly and run tests,
      # matching what a fresh `git clone` + `bun install` would look like.
      - name: Package source for relay's smoke test
        run: |
          tar --exclude='.git' --exclude='node_modules' --exclude='dist' \
            -czf /tmp/source-staging.tar.gz .

      - name: Build
        run: bun run build
        env:
          VITE_SUPABASE_URL:      ${{ vars.VITE_SUPABASE_URL      || secrets.STAGING_SUPABASE_URL      || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY || secrets.STAGING_SUPABASE_ANON_KEY || 'placeholder_anon_key' }}
          VITE_BUILD_SHA:         ${{ steps.stamp.outputs.sha }}
          VITE_BUILD_TIME:        ${{ steps.stamp.outputs.iso }}
          VITE_BUILD_BRANCH:      ${{ github.ref_name }}

      # Static, unauthenticated stamp — see deploy-dev.yml's identical step
      # for why (super-admin "Deploys" panel fetches this per-environment).
      - name: Write build-info.json
        run: |
          cat > dist/build-info.json <<EOF
          {
            "environment": "staging",
            "branch": "${{ github.ref_name }}",
            "tag": null,
            "sha": "${{ steps.stamp.outputs.sha }}",
            "buildTime": "${{ steps.stamp.outputs.iso }}"
          }
          EOF

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-staging
          path: dist
          retention-days: 1

      - name: Upload source artifact (for relay's smoke test)
        uses: actions/upload-artifact@v4
        with:
          name: source-staging
          path: /tmp/source-staging.tar.gz
          retention-days: 1
