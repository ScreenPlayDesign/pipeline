name: Deploy → Dev preview

# Canonical dev-preview deploy for every SPD project. Hosted here, not in
# any project or in foundation-template — see ci.yml's header comment for
# why. workflow_call-only; the calling repo's own run-deploy-dev.yml (or
# deploy-dev.yml, for simpler leaf-consumer repos that don't themselves get
# referenced by anyone else) declares the actual `push: branches: [dev]`
# trigger.
#
# Deploys using STAGING Supabase credentials — not separate dev ones — on
# purpose: dev and staging previews are meant to be directly comparable
# (same backend data, different frontend code), so the dev → staging
# standing PR (opened/merged by this repo's own webhook handler) can be
# reviewed just by opening both URLs side by side, without a schema/data
# mismatch confusing the diff.
#
# No smoke gate, no PR-opening logic here — that's this repo's job
# (handlers.ts), not a workflow file's. This is a preview deploy, nothing
# more.

on:
  workflow_call:
    inputs:
      sync-shared-contracts:
        description: 'Copy supabase/functions/_shared/contracts.ts to src/types/shared-contracts.ts before building (projects that generate frontend types from their edge functions)'
        type: boolean
        default: false

concurrency:
  group: deploy-dev
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Build + Deploy to Cloudflare Pages (dev)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: dev-preview   # tracking only — no required reviewers; resolves against the CALLER's own environment

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Sync shared-contracts.ts
        if: inputs.sync-shared-contracts
        run: cp supabase/functions/_shared/contracts.ts src/types/shared-contracts.ts || true

      - name: TypeScript check
        run: bun run typecheck

      - name: Build
        run: bun run build
        env:
          # Deliberately the STAGING vars — see header comment. dev and
          # staging previews share one backend on purpose.
          VITE_SUPABASE_URL:      ${{ vars.VITE_SUPABASE_URL      || secrets.STAGING_SUPABASE_URL      || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY || secrets.STAGING_SUPABASE_ANON_KEY || 'placeholder_anon_key' }}

      - name: Debug — print environment
        # GitHub Actions auto-masks any value that matches a secret used
        # anywhere in this workflow (CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
        # below get replaced with *** in the log automatically) — safe to
        # dump everything rather than guess which vars matter. Remove this
        # step once the deploy step's real error is identified; it's
        # diagnostic-only, not something to leave in permanently.
        run: env | sort
        env:
          CLOUDFLARE_API_TOKEN:      ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID:     ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PROJECT_NAME:   ${{ vars.CLOUDFLARE_PROJECT_NAME }}

      - name: Deploy to Cloudflare Pages
        # Bypasses cloudflare/wrangler-action on purpose: that action is
        # documented (cloudflare/wrangler-action#360) to swallow wrangler's
        # actual error and surface only its own generic wrapper exit code —
        # confirmed the hard way when this silently failed both before and
        # after pinning wranglerVersion, with identical zero-information
        # output either way. Running the CLI directly means whatever
        # wrangler actually says (auth failure, missing project, a genuine
        # Bun crash per oven-sh/bun#10464) prints straight into this log
        # instead of getting lost.
        run: bunx wrangler@4.107.0 pages deploy dist --project-name=${{ vars.CLOUDFLARE_PROJECT_NAME }} --branch=dev
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
