name: ci

# Canonical CI gate for every SPD project — plain typecheck + Playwright,
# pass or fail by exit code, no AI/LLM involvement anywhere in this file on
# purpose. Hosted HERE — in spd/pipeline, a repo that contains nothing but
# this handful of reusable workflow files — not in any project repo, not in
# foundation-template, and not in spd/github-app either.
#
# Two separate reasons this is its own repo, not folded into an existing one:
#  1. foundation-template is itself starter code that gets cloned wholesale
#     into new projects — CI logic that's supposed to apply platform-wide
#     shouldn't be entangled with "a thing that gets copied to start a
#     project," even referenced by pointer instead of copy-paste.
#  2. github-app hosts the platform's orchestration service (webhook
#     handling, standing-PR sync, provisioning) — real business logic, kept
#     private on purpose. This repo has to be PUBLIC instead: some SPD
#     projects live in GitHub organizations other than ScreenPlayDesign, and
#     GitHub's reusable-workflow `uses:` mechanism only allows a cross-org
#     reference when the source repo is public — a private repo's reusable
#     workflows can only be called from within the same org. Keeping this
#     repo to nothing but CI/deploy YAML (no secret values, no orchestration
#     internals — secrets always resolve against the CALLER's own runtime,
#     never live here) means going public costs nothing sensitive.
#
# Every consuming repo — foundation-template, web-dashboard, every future
# client project, regardless of which org it lives in — keeps only a thin
# run-ci.yml (or, for simple cases, a ci.yml that's just a trigger + this
# call) that does nothing but declare its own trigger and its own
# project-specific inputs, then calls:
#   uses: ScreenPlayDesign/pipeline/.github/workflows/ci.yml@main
#
# `vars.*`/`secrets.*` referenced below resolve against whichever repo's
# workflow run is actually calling this — the CALLER's own variables and
# secrets, not this repo's — so one shared file serves every project's own
# config without `inputs:` plumbing for values that already sit in the
# caller's repo settings. Falls back across two naming conventions
# (VITE_SUPABASE_URL as a var, or the older STAGING_SUPABASE_URL as a
# secret) so existing projects don't need a rename before this works.
#
# Two parallel jobs, not one combined job — typecheck/build and the
# Playwright visual gate run concurrently. The check names a repo's branch
# protection needs in its required-status-checks list are whatever the
# CALLING job-id composites with the names below, e.g.
# "ci / TypeScript + Build smoke test" and "ci / Gherkin + Playwright visual
# gate" if the caller names its job "ci". That composite-name change is the
# one real cost of adopting this pattern — update branch protection in the
# same sitting as switching a repo's workflow files over.

on:
  workflow_call:
    inputs:
      verify-shared-contracts:
        description: 'Fail fast if src/types/shared-contracts.ts is missing (projects that sync generated Supabase edge-function types into the frontend)'
        type: boolean
        default: false
      target-url:
        description: 'Base URL for the visual gate to test against (a deployed dev/staging/prod preview). Leave blank to let Playwright boot its own local dev server instead.'
        type: string
        default: ''

jobs:
  # ── Lane guard — the pipeline's structural rules, enforced as a check ──────
  # Runs only on PRs whose BASE is staging (i.e. a lane's standing PR). Two
  # rules from the 2026-07-07 lane model (see web-dashboard/supabase/
  # SCHEMA_REBUILD_PROPOSAL.md, Amendment v0.9.2):
  #
  #   SCHEMA FREEZE   design and chore lanes must not touch
  #                   supabase/migrations/** — migrations ride the dev lane
  #                   only, atomically with the code that needs them.
  #   ESCALATION FLAG when the dev lane DOES carry migrations, this job
  #                   surfaces it (step summary + output). The visual-gate
  #                   job independently detects the same thing and reports
  #                   carries_migration to the dashboard, which holds the
  #                   gate pending for the CORNERPOST even with CI green.
  #
  # Add "<caller-job-id> / Lane guard (schema freeze)" to the required
  # status checks on staging's branch protection alongside the two below.
  lane-guard:
    name: Lane guard (schema freeze)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: github.event_name == 'pull_request' && github.base_ref == 'staging'
    outputs:
      carries-migration: ${{ steps.diff.outputs.carries }}
      migration-files:   ${{ steps.diff.outputs.files }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check lane diff against the schema rules
        id: diff
        run: |
          LANE="${{ github.head_ref }}"
          git fetch origin staging --quiet
          FILES=$(git diff --name-only origin/staging...HEAD -- supabase/migrations/ | tr '\n' ' ' | sed 's/ $//')
          echo "files=$FILES"                                    >> "$GITHUB_OUTPUT"
          echo "carries=$([ -n "$FILES" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          if [ -n "$FILES" ]; then
            case "$LANE" in
              design|chore)
                echo "❌  The $LANE lane is SCHEMA-FROZEN — migrations ride the dev lane only." | tee -a "$GITHUB_STEP_SUMMARY"
                echo "    Offending files: $FILES" | tee -a "$GITHUB_STEP_SUMMARY"
                exit 1 ;;
              dev)
                echo "⚠️  This dev lane carries schema migrations: $FILES" >> "$GITHUB_STEP_SUMMARY"
                echo "    Its into-staging gate escalates to the cornerpost even when CI is green." >> "$GITHUB_STEP_SUMMARY" ;;
              *)
                echo "ℹ️  Non-lane head branch '$LANE' targeting staging — only the three lanes should PR into staging." | tee -a "$GITHUB_STEP_SUMMARY"
                exit 1 ;;
            esac
          fi

  typecheck-build:
    name: TypeScript + Build smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Verify shared-contracts.ts present
        if: inputs.verify-shared-contracts
        run: |
          if [[ ! -f src/types/shared-contracts.ts ]]; then
            echo "❌  src/types/shared-contracts.ts is missing."
            echo "    Run sync-contracts.sh (or the deploy workflow's sync step) and commit the result."
            exit 1
          fi

      - name: TypeScript check
        run: bun run typecheck

      - name: Build smoke test
        run: bun run build
        env:
          VITE_SUPABASE_URL:      ${{ vars.VITE_SUPABASE_URL      || secrets.STAGING_SUPABASE_URL      || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY || secrets.STAGING_SUPABASE_ANON_KEY || 'placeholder_anon_key' }}

  visual-gate:
    name: Gherkin + Playwright visual gate
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright (chromium)
        run: bunx playwright install --with-deps chromium

      - name: Run visual gate
        id: playwright
        # BASE_URL is exported conditionally, in-shell, rather than via this
        # step's `env:` block — GitHub Actions can't omit an env key based on
        # a condition, and `env: BASE_URL: ${{ inputs.target-url }}` would set
        # it to a literal empty string when the caller doesn't pass one.
        # Empty-string and unset are NOT the same thing here: Playwright only
        # auto-derives baseURL from its own webServer.url when BASE_URL is
        # truly absent from the environment. An explicitly-empty BASE_URL
        # overrides that and makes every relative page.goto('/...') fail with
        # "Cannot navigate to invalid URL" — confirmed the hard way once this
        # went live for a caller (web-dashboard) that intentionally leaves
        # target-url blank so Playwright boots and points at its own local
        # dev server instead of a deployed preview.
        run: |
          if [ -n "${{ inputs.target-url }}" ]; then
            export BASE_URL="${{ inputs.target-url }}"
          fi
          bun run test
        continue-on-error: true   # capture result even on failure, so the dashboard-post step below still runs
        env:
          SPD_ALLOW_HOST_DEV:     '1'
          VITE_SUPABASE_URL:      ${{ vars.VITE_SUPABASE_URL      || secrets.STAGING_SUPABASE_URL      || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY || secrets.STAGING_SUPABASE_ANON_KEY || 'placeholder_anon_key' }}

      - name: Upload gate evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-gate-report-${{ github.run_number }}
          path: |
            review/
            review/artifacts/
          retention-days: 14

      # Same migration detection as lane-guard, computed in-job (no `needs:`
      # — lane-guard is skipped on push events, and a needs-dependency on a
      # skipped job would skip this whole job with it).
      - name: Detect schema migrations in this diff
        id: schema
        if: always() && github.event_name == 'pull_request'
        run: |
          git fetch origin "${{ github.base_ref }}" --quiet || true
          FILES=$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD -- supabase/migrations/ 2>/dev/null | tr '\n' ' ' | sed 's/ $//')
          echo "files=$FILES"                                    >> "$GITHUB_OUTPUT"
          echo "carries=$([ -n "$FILES" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      # BRANCH is the PR *head* for lane PRs (the lane name is what the
      # gate is keyed on: record_gate_report's p_branch → from_lane), and
      # the pushed branch otherwise. CARRIES_MIGRATION/MIGRATION_FILES feed
      # record_gate_report's p_carries_migration/p_migration_files so a
      # migration-carrying dev gate stays pending for the cornerpost.
      - name: Post results to SPD dashboard
        if: always() && vars.SPD_API_URL != ''
        env:
          SPD_API_TOKEN:     ${{ secrets.SPD_API_TOKEN }}
          SPD_API_URL:       ${{ vars.SPD_API_URL }}
          SPD_PROJECT_SLUG:  ${{ vars.SPD_PROJECT_SLUG }}
          BRANCH:            ${{ github.event.pull_request.head.ref || github.ref_name }}
          GITHUB_RUN_ID:     ${{ github.run_id }}
          GITHUB_RUN_URL:    ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PLAYWRIGHT_EXIT:   ${{ steps.playwright.outcome }}
          CARRIES_MIGRATION: ${{ steps.schema.outputs.carries || 'false' }}
          MIGRATION_FILES:   ${{ steps.schema.outputs.files }}
        run: |
          if [ -f "scripts/post-spd-results.ts" ]; then
            bun run scripts/post-spd-results.ts || echo "⚠  SPD result post failed (non-fatal)"
          else
            echo "scripts/post-spd-results.ts not found — skipping SPD report"
          fi

      - name: Fail job if tests failed
        if: steps.playwright.outcome == 'failure'
        run: exit 1
